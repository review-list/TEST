name: Oracle A1 Auto Retry
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  retry:
    runs-on: ubuntu-latest
    steps:
      - name: Setup OCI CLI
        run: pip install oci-cli

      - name: Configure OCI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          cat > ~/.oci/config << EOF
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=ap-tokyo-1
          key_file=/home/runner/.oci/key.pem
          EOF

      - name: Apply stack
        run: |
          JOB=$(oci resource-manager job create-apply-job \
            --stack-id ${{ secrets.OCI_STACK_ID }} \
            --execution-plan-strategy AUTO_APPROVED 2>&1) || true
          JOB_ID=$(echo "$JOB" | python3 -c "import json,sys; print(json.load(sys.stdin)['data']['id'])" 2>/dev/null) || true
          if [ -z "$JOB_ID" ]; then
            echo "ジョブ作成失敗。次回スケジュールで再試行。"
            exit 0
          fi
          echo "Job ID: $JOB_ID"
          for i in $(seq 1 10); do
            sleep 20
            STATUS=$(oci resource-manager job get --job-id $JOB_ID 2>/dev/null | python3 -c "import json,sys; print(json.load(sys.stdin)['data']['lifecycle-state'])") || true
            echo "Status: $STATUS"
            if [ "$STATUS" = "SUCCEEDED" ]; then echo "成功！"; exit 0; fi
            if [ "$STATUS" = "FAILED" ]; then echo "失敗（容量不足）。次回再試行。"; exit 0; fi
          done
          echo "タイムアウト。次回再試行。"
          exit 0
